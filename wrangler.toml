name = "toolstekno"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "NEXT_CACHE_WORKERS_KV"
id = "dummy"

[[d1_databases]]
binding = "NEXT_CACHE_WORKERS_D1"
database_name = "dummy"
database_id = "dummy"
