<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Square Background with Gradient -->
  <rect width="90" height="90" x="5" y="5" rx="20" fill="url(#grad1)" />
  
  <!-- Stylized Laptop Icon -->
  <rect x="25" y="30" width="50" height="32" rx="4" fill="white" />
  <path d="M20 62 L80 62 L85 72 L15 72 Z" fill="white" opacity="0.9" />
  
  <!-- Stylized 'T' inside the laptop -->
  <rect x="42" y="38" width="16" height="4" rx="1" fill="#1d4ed8" />
  <rect x="48" y="38" width="4" height="12" rx="1" fill="#1d4ed8" />

  <!-- Subtle Shine/Reflect -->
  <path d="M15 15 L45 15 Q15 15 15 45 Z" fill="white" opacity="0.15" />
</svg>
